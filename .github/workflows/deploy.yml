name: Deploy Dashboard
on:
  push:
    branches: [main]
  schedule:
    # 6am MST (Nov-Mar) = 13:00 UTC
    # 6am MDT (Mar-Nov) = 12:00 UTC
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check DST
        id: dst_check
        run: |
          HOUR_MT=$(TZ=America/Denver date +%H)
          echo "Mountain Time hour: $HOUR_MT"
          if [ "$HOUR_MT" = "06" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Wrong hour for current DST — skipping"
          fi

      - name: Checkout
        if: steps.dst_check.outputs.skip != 'true' || github.event_name != 'schedule'
        uses: actions/checkout@v4

      - name: Setup Pages
        if: steps.dst_check.outputs.skip != 'true' || github.event_name != 'schedule'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.dst_check.outputs.skip != 'true' || github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        if: steps.dst_check.outputs.skip != 'true' || github.event_name != 'schedule'
        id: deployment
        uses: actions/deploy-pages@v4
